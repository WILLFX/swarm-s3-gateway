[package]
name = "chain-registry-pallet"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
parity-scale-codec = { version = "3", default-features = false, features = ["derive"] }
scale-info = { version = "2", default-features = false, features = ["derive"] }

# Substrate FRAME crates should be pinned to the exact runtime/toolchain version
# used by your target chain. Keep them aligned with that chain's SDK release.
frame-support = { version = "39", default-features = false }
frame-system = { version = "39", default-features = false }
sp-std = { version = "14", default-features = false }

[features]
default = ["std"]
std = [
  "parity-scale-codec/std",
  "scale-info/std",
  "frame-support/std",
  "frame-system/std",
  "sp-std/std",
]
