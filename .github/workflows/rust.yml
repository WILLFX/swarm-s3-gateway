name: Rust

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
      - test/**
      - docs/**
      - ci/**
  pull_request:
    branches:
      - main

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check private lifecycle smoke script syntax
        run: bash -n scripts/private_lifecycle_smoke.sh

      - name: Test chain registry pallet
        run: cargo test -p chain-registry-pallet -- --nocapture

      - name: Prevent silent development signers
        run: ./scripts/check_no_silent_dev_signers.sh

      - name: Check docs secret safety
        run: ./scripts/check_docs_secret_safety.py

      - name: Check gateway
        run: cargo check -p gateway

      - name: Test gateway
        run: cargo test -p gateway -- --nocapture

      - name: Check identity contract
        run: cargo check --manifest-path contracts/s3_identity_contract/Cargo.toml

      - name: Test identity contract
        run: cargo test --manifest-path contracts/s3_identity_contract/Cargo.toml -- --nocapture

      - name: Check bucket contract
        run: cargo check --manifest-path contracts/s3_bucket_contract/Cargo.toml

      - name: Test bucket contract
        run: cargo test --manifest-path contracts/s3_bucket_contract/Cargo.toml -- --nocapture
