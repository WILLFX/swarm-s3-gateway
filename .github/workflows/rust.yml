name: Rust

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
      - test/**
      - docs/**
      - ci/**
  pull_request:
    branches:
      - main

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check private lifecycle smoke script syntax
        run: bash -n scripts/private_lifecycle_smoke.sh

      - name: Test chain registry pallet
        run: cargo test -p chain-registry-pallet -- --nocapture

      - name: Prevent silent development signers
        run: ./scripts/check_no_silent_dev_signers.sh

      - name: Check docs secret safety
        run: ./scripts/check_docs_secret_safety.py

      - name: Check chain privacy surface
        run: ./scripts/check_chain_privacy_surface.py

      - name: Check env templates
        run: ./scripts/check_env_templates.py

      - name: Check delegation scope surface
        run: ./scripts/check_delegation_scope_surface.py

      - name: Check bucket type contract surface
        run: ./scripts/check_bucket_type_contract_surface.py

      - name: Check identity encryption key CLI surface
        run: ./scripts/check_identity_encryption_key_cli_surface.py

      - name: Check gateway encryption key registry read surface
        run: ./scripts/check_gateway_encryption_key_registry_read_surface.py

      - name: Check identity encryption key registry surface
        run: ./scripts/check_identity_encryption_key_registry_surface.py

      - name: Check trustless private access model
        run: ./scripts/check_trustless_private_access_model.py

      - name: Check request body limit surface
        run: ./scripts/check_request_body_limit_surface.py

      - name: Check SigV4 freshness surface
        run: ./scripts/check_sigv4_freshness_surface.py

      - name: Check owner catalog fail-closed behavior
        run: ./scripts/check_owner_catalog_fail_closed.py

      - name: Check gateway owner catalog CAS surface
        run: ./scripts/check_gateway_owner_catalog_cas_surface.py

      - name: Check gateway CAS anchor surface
        run: ./scripts/check_gateway_cas_anchor_surface.py

      - name: Check gateway
        run: cargo check -p gateway

      - name: Test gateway
        run: cargo test -p gateway -- --nocapture

      - name: Check identity contract
        run: cargo check --manifest-path contracts/s3_identity_contract/Cargo.toml

      - name: Test identity contract
        run: cargo test --manifest-path contracts/s3_identity_contract/Cargo.toml -- --nocapture

      - name: Check bucket contract
        run: cargo check --manifest-path contracts/s3_bucket_contract/Cargo.toml

      - name: Test bucket contract
        run: cargo test --manifest-path contracts/s3_bucket_contract/Cargo.toml -- --nocapture
